<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <title>Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  </head>

  <body>
    <div class="col-8 m-auto pt-2 pb-2 text-center">
        <h1>Cadastro</h1>
    </div>

    <div class="col-8 m-auto pt-3 text-center">
        <a href="/" class="btn btn-info">Voltar</a>
    </div>

    <div class="col-8 m-auto pt-2 pb-4 text-center">
        <form name ="form" id="form" method="post">
            {% csrf_token %}
            <!--{{form.as_p}}-->
            <div class="form-group mt-4">Nome do Usuário do veículo:  {{form.Nome_do_usuário_do_veículo}}</div>
            <div class="form-group mt-4">Placa do Carro:  {{form.Placa_do_Carro}}</div>
            <div class="form-group mt-4">Marca do Carro:  {{form.Marca_do_Carro}}</div>
            <div class="form-group mt-4">Ano do Carro:  {{form.Ano_do_Carro}}</div>
            <div class="form-group mt-4">Cor do veículo:  {{form.Cor_do_veículo}}</div>
            <div class="form-group mt-4 pb-4">Número do RENAVAM:  {{form.Número_do_RENAVAM}}</div>
            <input type="submit" class="btn btn-success" value="Salvar">
        </form>
    </div>
  </body>
</html>
